<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thread Crawler</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #08080f;
      --glass: rgba(15,12,28,0.5);
      --glass-border: rgba(168,130,247,0.12);
      --purple: #A882F7;
      --emerald: #34D399;
      --gold: #FBBF24;
      --red: #F87171;
      --cyan: #22D3EE;
      --text: #E2E0F0;
      --text-dim: #9590B0;
      --text-muted: #5E587A;
    }

    body {
      font-family: 'Space Grotesk', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow: hidden;
    }

    /* ─── BACKGROUND ─── */
    .bg-layer {
      position: fixed; inset: 0; z-index: 0;
      background-image: url('bg.jpg');
      background-size: cover;
      filter: blur(40px) brightness(0.2) saturate(1.2);
      transform: scale(1.15);
    }

    .bg-overlay {
      position: fixed; inset: 0; z-index: 1;
      background: radial-gradient(ellipse at 30% 20%, rgba(168,130,247,0.08) 0%, transparent 50%),
                  linear-gradient(180deg, rgba(8,8,15,0.8) 0%, rgba(8,8,15,0.95) 100%);
    }

    /* ─── GLASS ─── */
    .glass {
      background: var(--glass);
      backdrop-filter: blur(24px) saturate(1.6);
      -webkit-backdrop-filter: blur(24px) saturate(1.6);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.04);
    }

    /* ─── LAYOUT ─── */
    .app {
      position: relative; z-index: 10;
      display: flex;
      height: 100vh;
      gap: 8px;
      padding: 8px;
    }

    .sidebar {
      width: 240px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
    }

    .game-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* ─── TITLE SCREEN ─── */
    #title-screen {
      position: absolute; inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 20;
    }

    .title-icon {
      width: 80px; height: 80px;
      background: linear-gradient(135deg, var(--purple-dim), rgba(124,58,237,0.2));
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 20px;
      border: 1px solid rgba(168,130,247,0.2);
      box-shadow: 0 8px 32px rgba(168,130,247,0.15);
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .title-icon svg {
      width: 40px; height: 40px;
      stroke: var(--purple);
      fill: none;
      stroke-width: 2;
    }

    .title-text {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--purple), var(--emerald));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    .title-sub {
      font-size: 12px;
      color: var(--text-dim);
      margin-bottom: 24px;
    }

    .start-btn {
      padding: 12px 32px;
      background: linear-gradient(135deg, var(--purple), #7C3AED);
      border: none;
      border-radius: 12px;
      color: white;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 8px 32px rgba(168,130,247,0.3);
      transition: all 0.2s;
    }

    .start-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(168,130,247,0.4);
    }

    /* ─── GAME SCREEN ─── */
    #game-screen {
      display: none;
      flex-direction: column;
      gap: 8px;
      height: 100%;
    }

    .header-bar {
      padding: 8px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 700;
    }

    .logo-icon {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, var(--purple), #7C3AED);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }

    .logo-icon svg {
      width: 16px; height: 16px;
      stroke: white;
      fill: none;
      stroke-width: 2;
    }

    .stats {
      display: flex;
      gap: 12px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text-dim);
    }

    .stat { display: flex; align-items: center; gap: 4px; }

    .stat-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
    }

    .stat-hp .stat-dot { background: var(--red); box-shadow: 0 0 6px rgba(248,113,113,0.5); }
    .stat-gold .stat-dot { background: var(--gold); box-shadow: 0 0 6px rgba(251,191,36,0.5); }
    .stat-xp .stat-dot { background: var(--purple); box-shadow: 0 0 6px rgba(168,130,247,0.5); }
    .stat-depth .stat-dot { background: var(--cyan); box-shadow: 0 0 6px rgba(34,211,238,0.5); }

    .hp-bar {
      width: 80px; height: 6px;
      background: rgba(255,255,255,0.06);
      border-radius: 3px;
      overflow: hidden;
    }

    .hp-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--red), #FB7185);
      border-radius: 3px;
      transition: width 0.3s;
    }

    /* ─── GAME CONTAINER ─── */
    #game-container {
      flex: 1;
      border-radius: 12px;
      overflow: hidden;
      background: var(--bg);
      border: 1px solid var(--glass-border);
    }

    #game-container canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    /* ─── LOG ─── */
    .log-panel {
      padding: 8px 12px;
      max-height: 100px;
      overflow-y: auto;
    }

    .log-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .log-entry {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      color: var(--text-muted);
      padding: 2px 0;
      border-bottom: 1px solid rgba(255,255,255,0.02);
    }

    /* ─── CONTROLS ─── */
    .controls-panel {
      padding: 10px 12px;
    }

    .controls-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .control-row {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: var(--text-dim);
      padding: 2px 0;
    }

    .control-key {
      font-family: 'JetBrains Mono', monospace;
      color: var(--purple);
      font-weight: 500;
    }

    /* ─── GAME OVER ─── */
    #gameover-screen {
      display: none;
      position: absolute; inset: 0;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 20;
      background: rgba(8,8,15,0.9);
    }

    .go-icon {
      width: 64px; height: 64px;
      background: rgba(248,113,113,0.1);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 16px;
      border: 1px solid rgba(248,113,113,0.15);
    }

    .go-icon svg {
      width: 32px; height: 32px;
      stroke: var(--red);
      fill: none;
      stroke-width: 2;
    }

    .go-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--red);
      margin-bottom: 12px;
    }

    .go-stats {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-dim);
      text-align: center;
      line-height: 2;
      margin-bottom: 20px;
    }

    /* ─── SCROLLBAR ─── */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(168,130,247,0.15); border-radius: 2px; }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 768px) {
      .app { flex-direction: column; }
      .sidebar { width: 100%; flex-direction: row; flex-wrap: wrap; }
      .sidebar > div { flex: 1; min-width: 150px; }
    }
  </style>
</head>
<body>
  <div class="bg-layer"></div>
  <div class="bg-overlay"></div>

  <div class="app">
    <!-- Sidebar -->
    <div class="sidebar">
      <!-- Header -->
      <div class="header-bar glass">
        <div class="logo">
          <div class="logo-icon">
            <svg viewBox="0 0 24 24"><path d="M3 21V8l9-5 9 5v13M9 21V13h6v8M12 3v5"/></svg>
          </div>
          THREAD CRAWLER
        </div>
      </div>

      <!-- Stats -->
      <div class="glass" style="padding: 10px 12px;">
        <div class="stats" style="flex-direction: column; gap: 6px;">
          <div class="stat stat-hp">
            <div class="stat-dot"></div>
            <span>HP</span>
            <div class="hp-bar"><div class="hp-fill" id="hp-fill" style="width:100%"></div></div>
            <span id="hp-text">100/100</span>
          </div>
          <div class="stat stat-gold">
            <div class="stat-dot"></div>
            <span>Gold</span>
            <span id="gold-text">0</span>
          </div>
          <div class="stat stat-xp">
            <div class="stat-dot"></div>
            <span>Level</span>
            <span id="level-text">Lv.1</span>
          </div>
          <div class="stat stat-depth">
            <div class="stat-dot"></div>
            <span>Depth</span>
            <span id="depth-text">Depth 0</span>
          </div>
        </div>
      </div>

      <!-- Controls -->
      <div class="glass controls-panel">
        <div class="controls-title">Controls</div>
        <div class="control-row"><span>Move</span><span class="control-key">WASD / Arrows</span></div>
        <div class="control-row"><span>Shoot</span><span class="control-key">SPACE</span></div>
        <div class="control-row"><span>Interact</span><span class="control-key">E</span></div>
      </div>

      <!-- Log -->
      <div class="glass log-panel" style="flex: 1;">
        <div class="log-title">Activity Log</div>
        <div id="game-log"></div>
      </div>
    </div>

    <!-- Game Area -->
    <div class="game-area">
      <!-- Title Screen -->
      <div id="title-screen" class="glass">
        <div class="title-icon">
          <svg viewBox="0 0 24 24"><path d="M3 21V8l9-5 9 5v13M9 21V13h6v8M12 3v5"/></svg>
        </div>
        <div class="title-text">Thread Crawler</div>
        <div class="title-sub">Dive into comment threads. Each reply is a room.</div>
        <button class="start-btn" onclick="startGame()">Enter the Dungeon</button>
      </div>

      <!-- Phaser Game Container -->
      <div id="game-container"></div>

      <!-- Game Screen UI -->
      <div id="game-screen" class="glass"></div>

      <!-- Game Over -->
      <div id="gameover-screen" class="glass">
        <div class="go-icon">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="10" r="8"/><circle cx="9" cy="9" r="1.5" fill="currentColor"/><circle cx="15" cy="9" r="1.5" fill="currentColor"/><path d="M9 17v3M12 17v3M15 17v3"/></svg>
        </div>
        <div class="go-title">YOU DIED</div>
        <div class="go-stats" id="go-stats"></div>
        <button class="start-btn" onclick="restartGame()">Try Again</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  <script src="game.js"></script>
</body>
</html>
