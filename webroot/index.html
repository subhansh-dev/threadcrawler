<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thread Crawler</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0A0A0A;
      --bg-card: #141414;
      --bg-card2: #1C1C1C;
      --border: #2A2A2A;
      --border-light: #3A3A3A;
      --text: #C8C8A8;
      --text-dim: #888868;
      --text-muted: #585840;
      --pink: #E87898;
      --purple: #A882F7;
      --blue: #3890F8;
      --green: #48C848;
      --red: #E83838;
      --yellow: #F8D838;
      --gold: #F8B800;
      /* DMG-01 green palette */
      --gb-light: #9BBC0F;
      --gb-mid: #8BAC0F;
      --gb-dark: #306230;
      --gb-darkest: #0F380F;
      --gb-body: #C4CFA1;
      --gb-body-light: #D4DFAE;
      --gb-body-dark: #A4AF84;
      --gb-body-shadow: #8A946A;
      --gb-bezel: #65655B;
      --gb-bezel-light: #7A7A70;
      --gb-bezel-dark: #4A4A42;
    }

    html { height: 100%; }

    body {
      font-family: 'VT323', monospace;
      background: #0A0A0A;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      image-rendering: pixelated;
      position: relative;
      overflow-x: hidden;
    }

    /* ═══ RETRO GRID BACKGROUND ═══ */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        /* Pixel grid */
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 3px,
          rgba(255,255,255,0.008) 3px,
          rgba(255,255,255,0.008) 4px
        ),
        repeating-linear-gradient(
          90deg,
          transparent,
          transparent 3px,
          rgba(255,255,255,0.008) 3px,
          rgba(255,255,255,0.008) 4px
        ),
        /* DMG green glow spots */
        radial-gradient(ellipse at 50% 40%, rgba(155,188,15,0.04) 0%, transparent 60%),
        radial-gradient(ellipse at 20% 70%, rgba(48,98,48,0.03) 0%, transparent 40%),
        radial-gradient(ellipse at 80% 20%, rgba(155,188,15,0.02) 0%, transparent 40%);
      pointer-events: none;
    }

    /* ═══ SCANLINE OVERLAY ═══ */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 999;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.03) 2px,
        rgba(0,0,0,0.03) 4px
      );
      pointer-events: none;
    }

    /* ═══ PIXEL DECORATIONS ═══ */
    .pixel-deco {
      position: fixed;
      z-index: 0;
      width: 4px;
      height: 4px;
      opacity: 0.15;
      pointer-events: none;
    }

    .pixel-deco-tl {
      top: 20px;
      left: 20px;
      box-shadow:
        0px 0px 0 2px var(--gb-light),
        6px 0px 0 2px var(--gb-light),
        12px 0px 0 2px var(--gb-light),
        0px 6px 0 2px var(--gb-light),
        6px 6px 0 2px var(--gb-dark),
        12px 6px 0 2px var(--gb-light),
        0px 12px 0 2px var(--gb-light),
        6px 12px 0 2px var(--gb-light),
        12px 12px 0 2px var(--gb-light);
    }

    .pixel-deco-tr {
      top: 20px;
      right: 20px;
      box-shadow:
        0px 0px 0 2px var(--gb-light),
        6px 0px 0 2px var(--gb-light),
        12px 0px 0 2px var(--gb-light),
        0px 6px 0 2px var(--gb-light),
        6px 6px 0 2px var(--gb-darkest),
        12px 6px 0 2px var(--gb-light),
        0px 12px 0 2px var(--gb-light),
        6px 12px 0 2px var(--gb-light),
        12px 12px 0 2px var(--gb-light);
    }

    .pixel-deco-bl {
      bottom: 20px;
      left: 20px;
      box-shadow:
        0px 0px 0 2px var(--gb-light),
        6px 0px 0 2px var(--gb-light),
        12px 0px 0 2px var(--gb-light),
        0px 6px 0 2px var(--gb-light),
        6px 6px 0 2px var(--gb-darkest),
        12px 6px 0 2px var(--gb-light),
        0px 12px 0 2px var(--gb-light),
        6px 12px 0 2px var(--gb-light),
        12px 12px 0 2px var(--gb-light);
    }

    .pixel-deco-br {
      bottom: 20px;
      right: 20px;
      box-shadow:
        0px 0px 0 2px var(--gb-light),
        6px 0px 0 2px var(--gb-light),
        12px 0px 0 2px var(--gb-light),
        0px 6px 0 2px var(--gb-light),
        6px 6px 0 2px var(--gb-light),
        12px 6px 0 2px var(--gb-light),
        0px 12px 0 2px var(--gb-light),
        6px 12px 0 2px var(--gb-light),
        12px 12px 0 2px var(--gb-light);
    }

    /* ═══ MAIN CONTENT ═══ */
    .app {
      position: relative;
      z-index: 1;
    }

    /* ═══ PIXEL BORDER UTILITY ═══ */
    .pixel-border {
      border: 3px solid var(--border);
      box-shadow:
        inset 2px 2px 0 rgba(255,255,255,0.04),
        inset -2px -2px 0 rgba(0,0,0,0.15),
        4px 4px 0 rgba(0,0,0,0.25);
    }

    .pixel-border-light {
      border: 2px solid var(--border-light);
      box-shadow:
        inset 1px 1px 0 rgba(255,255,255,0.05),
        3px 3px 0 rgba(0,0,0,0.2);
    }

    /* ═══ GAMEBOY SHELL ═══ */
    .gameboy {
      width: 520px;
      margin-top: 12px;
      flex-shrink: 0;
    }

    .gb-body {
      background: linear-gradient(180deg, var(--gb-body-light), var(--gb-body), var(--gb-body-dark));
      border-radius: 14px 14px 14px 70px;
      padding: 14px 14px 65px;
      box-shadow:
        inset 2px 2px 0 rgba(255,255,255,0.3),
        inset -2px -2px 0 rgba(0,0,0,0.08),
        0 5px 0 var(--gb-body-shadow),
        0 8px 24px rgba(0,0,0,0.5),
        6px 0 0 var(--gb-body-dark),
        -4px 0 0 var(--gb-body-light);
      position: relative;
    }

    .gb-screen-bezel {
      background: linear-gradient(135deg, var(--gb-bezel-light), var(--gb-bezel), var(--gb-bezel-dark));
      border-radius: 10px 10px 10px 35px;
      padding: 12px 14px 10px;
      box-shadow: inset 2px 2px 0 rgba(255,255,255,0.1), inset -2px -2px 0 rgba(0,0,0,0.25);
    }

    .gb-brand {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
      padding: 0 4px;
    }

    .gb-brand-title {
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      color: #8A8A9A;
      letter-spacing: 1px;
    }

    .gb-power {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .gb-power-led {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #333;
      border: 1px solid #222;
      transition: all 0.3s;
    }

    .gb-power-led.on {
      background: #FF2020;
      box-shadow: 0 0 8px #FF2020, 0 0 16px rgba(255,32,32,0.3);
    }

    .gb-power-text {
      font-family: 'Press Start 2P', monospace;
      font-size: 5px;
      color: #606070;
    }

    /* ═══ SCREEN (colorful, not green) ═══ */
    .gb-screen {
      background: #000000;
      border-radius: 4px;
      border: 3px solid #2A2A2A;
      box-shadow: inset 0 0 24px rgba(0,0,0,0.3);
      overflow: hidden;
      position: relative;
      height: 340px;
    }

    .gb-screen::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.015) 2px, rgba(0,0,0,0.015) 4px);
      pointer-events: none;
      z-index: 50;
    }

    .gb-screen-content {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    /* ═══ HUD (inside screen) ═══ */
    .gb-hud {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 5px 8px;
      background: rgba(0,0,0,0.3);
      border-bottom: 2px solid rgba(255,255,255,0.05);
      min-height: 24px;
      flex-shrink: 0;
    }

    .gb-hud-left, .gb-hud-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .gb-hud-stat {
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      color: #C0B8D8;
      display: flex;
      align-items: center;
      gap: 3px;
    }

    .gb-hp-bar {
      width: 50px; height: 6px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      overflow: hidden;
    }

    .gb-hp-fill {
      height: 100%;
      background: var(--green);
      transition: width 0.3s;
    }

    .gb-depth-bar { display: flex; gap: 2px; }

    .gb-depth-pip {
      width: 6px; height: 6px;
      border: 1px solid rgba(255,255,255,0.2);
      background: transparent;
      transition: all 0.2s;
    }

    .gb-depth-pip.active { background: var(--pink); border-color: var(--pink); box-shadow: 0 0 4px rgba(232,120,152,0.5); }
    .gb-depth-pip.visited { background: rgba(232,120,152,0.3); border-color: rgba(232,120,152,0.4); }

    /* ═══ GAME AREA ═══ */
    .gb-game-area {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    #game-container { width: 100%; height: 100%; }

    #game-container canvas {
      width: 100% !important;
      height: 100% !important;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    /* ═══ OVERLAYS ═══ */
    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.95);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 40;
    }

    .overlay.show { display: flex; }

    .overlay h1 {
      font-family: 'Press Start 2P', monospace;
      font-size: 18px;
      color: var(--pink);
      margin-bottom: 6px;
      text-shadow: 0 0 20px rgba(232,120,152,0.4);
    }

    .overlay h2 {
      font-family: 'Press Start 2P', monospace;
      font-size: 16px;
      color: var(--red);
      margin-bottom: 10px;
    }

    .overlay p {
      font-family: 'VT323', monospace;
      font-size: 16px;
      color: var(--text-dim);
      max-width: 360px;
      text-align: center;
      line-height: 1.4;
      margin-bottom: 16px;
    }

    .overlay .pixel-icon {
      width: 56px; height: 56px;
      margin-bottom: 16px;
      background: linear-gradient(135deg, #2A1A44, #1A1028);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 20px rgba(232,120,152,0.3);
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }

    .overlay-stats {
      font-family: 'VT323', monospace;
      font-size: 16px;
      color: var(--text-dim);
      line-height: 1.8;
      text-align: center;
      margin-bottom: 16px;
    }

    /* ═══ INVENTORY OVERLAY ═══ */
    .inv-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.95);
      display: none;
      flex-direction: column;
      align-items: center;
      z-index: 30;
      padding: 12px;
    }

    .inv-overlay.show { display: flex; }

    .inv-title {
      font-family: 'Press Start 2P', monospace;
      font-size: 10px;
      color: var(--text);
      margin-bottom: 10px;
    }

    .inv-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
      width: 100%;
      max-width: 400px;
      flex: 1;
      overflow-y: auto;
      align-content: start;
    }

    .inv-item {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 8px;
      background: var(--bg-card2);
      border: 2px solid var(--border);
      cursor: pointer;
      font-family: 'VT323', monospace;
      font-size: 14px;
      color: var(--text-dim);
      transition: all 0.1s;
    }

    .inv-item:hover { background: var(--border); color: var(--text); }
    .inv-item.equipped { border-color: var(--blue); background: rgba(56,144,248,0.12); }
    .inv-icon { font-size: 16px; width: 18px; text-align: center; }
    .inv-equipped-tag { font-family: 'Press Start 2P'; font-size: 6px; color: var(--blue); margin-left: auto; }
    .inv-empty { font-family: 'Press Start 2P'; font-size: 7px; color: var(--text-muted); text-align: center; padding: 24px; grid-column: 1/-1; }

    /* ═══ TEXT BOX (inside screen) ═══ */
    .gb-textbox {
      background: rgba(0,0,0,0.25);
      border-top: 2px solid rgba(255,255,255,0.06);
      padding: 4px 8px;
      min-height: 36px;
      max-height: 52px;
      overflow-y: auto;
      flex-shrink: 0;
    }

    .gb-textbox-title {
      font-family: 'Press Start 2P', monospace;
      font-size: 5px;
      color: rgba(255,255,255,0.2);
      margin-bottom: 2px;
    }

    .gb-textbox-log {
      font-family: 'VT323', monospace;
      font-size: 14px;
      color: #B0A8C8;
      line-height: 1.2;
    }

    /* ═══ STATUS ═══ */
    .gb-status-bar { display: flex; gap: 3px; padding: 2px 6px; flex-shrink: 0; }

    .gb-status-badge {
      font-family: 'Press Start 2P', monospace;
      font-size: 5px;
      padding: 1px 4px;
      border-radius: 3px;
      border: 1px solid;
    }

    /* ═══ TRANSITION ═══ */
    .gb-transition {
      position: absolute; inset: 0;
      background: #000;
      z-index: 60;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .gb-transition.active { opacity: 1; }

    /* ═══ GB BUTTONS ═══ */
    .gb-controls-area {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-top: 12px;
      padding: 0 10px;
    }

    .gb-dpad { position: relative; width: 70px; height: 70px; }

    .gb-dpad-btn {
      position: absolute;
      background: linear-gradient(180deg, #3A3A3A, #2A2A2A);
      border: none;
      cursor: pointer;
      box-shadow: inset 1px 1px 0 rgba(255,255,255,0.1), 0 2px 0 #1A1A1A;
    }

    .gb-dpad-btn:active { box-shadow: inset 1px 1px 0 rgba(0,0,0,0.3); transform: translateY(1px); }

    .gb-dpad-up { top: 0; left: 24px; width: 22px; height: 22px; border-radius: 4px 4px 0 0; }
    .gb-dpad-down { bottom: 0; left: 24px; width: 22px; height: 22px; border-radius: 0 0 4px 4px; }
    .gb-dpad-left { top: 24px; left: 0; width: 22px; height: 22px; border-radius: 4px 0 0 4px; }
    .gb-dpad-right { top: 24px; right: 0; width: 22px; height: 22px; border-radius: 0 4px 4px 0; }
    .gb-dpad-center { position: absolute; top: 24px; left: 24px; width: 22px; height: 22px; background: #2A2A2A; }

    .gb-dpad-up::after { content:''; position:absolute; top:5px; left:50%; transform:translateX(-50%); border-left:4px solid transparent; border-right:4px solid transparent; border-bottom:5px solid #666; }
    .gb-dpad-down::after { content:''; position:absolute; bottom:5px; left:50%; transform:translateX(-50%); border-left:4px solid transparent; border-right:4px solid transparent; border-top:5px solid #666; }
    .gb-dpad-left::after { content:''; position:absolute; left:5px; top:50%; transform:translateY(-50%); border-top:4px solid transparent; border-bottom:4px solid transparent; border-right:5px solid #666; }
    .gb-dpad-right::after { content:''; position:absolute; right:5px; top:50%; transform:translateY(-50%); border-top:4px solid transparent; border-bottom:4px solid transparent; border-left:5px solid #666; }

    .gb-ab-area { display: flex; gap: 10px; transform: rotate(-25deg); }
    .gb-ab-wrap { text-align: center; }

    .gb-ab-btn {
      width: 34px; height: 34px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      color: rgba(255,255,255,0.5);
      background: linear-gradient(180deg, #A0325A, #8A2048);
      box-shadow: inset 2px 2px 0 rgba(255,255,255,0.15), 0 3px 0 #6A2040, 0 4px 6px rgba(0,0,0,0.3);
    }

    .gb-ab-btn:active { box-shadow: inset 2px 2px 0 rgba(0,0,0,0.2), 0 1px 0 #6A2040; transform: translateY(2px); }
    .gb-ab-label { font-family: 'Press Start 2P'; font-size: 5px; color: var(--gb-body-shadow); margin-top: 4px; }

    .gb-ss-area { display: flex; gap: 16px; justify-content: center; margin-top: 8px; transform: rotate(-25deg); }
    .gb-ss-wrap { text-align: center; }

    .gb-ss-btn {
      width: 24px; height: 8px;
      border-radius: 4px;
      background: linear-gradient(180deg, #8A8A7A, #6A6A5A);
      border: none;
      cursor: pointer;
      box-shadow: inset 1px 1px 0 rgba(255,255,255,0.1), 0 2px 0 #4A4A3A;
    }

    .gb-ss-btn:active { box-shadow: 0 1px 0 #4A4A3A; transform: translateY(1px); }
    .gb-ss-label { font-family: 'Press Start 2P'; font-size: 4px; color: var(--gb-body-shadow); margin-top: 3px; }

    .gb-speaker {
      position: absolute;
      bottom: 18px;
      right: 10px;
      width: 30px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      transform: rotate(-30deg);
    }

    .gb-speaker-line { height: 2px; background: var(--gb-body-shadow); border-radius: 1px; opacity: 0.5; }

    .gb-nintendo-seal {
      position: absolute;
      bottom: 48px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Press Start 2P', monospace;
      font-size: 4px;
      color: var(--gb-body-shadow);
      text-align: center;
      line-height: 1.6;
    }

    .gb-seal-star {
      width: 20px; height: 20px;
      border: 1.5px solid var(--gb-body-shadow);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 2px;
      font-size: 8px;
    }

    /* ═══ WEB UI BELOW GAMEBOY ═══ */
    .web-bar {
      width: 520px;
      display: flex;
      gap: 6px;
      margin-top: 8px;
      flex-shrink: 0;
      padding: 8px 10px;
      background: #111111;
      border: 2px solid #222;
      border-radius: 8px;
      box-shadow: 3px 3px 0 rgba(0,0,0,0.4);
    }

    .web-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      padding: 7px 14px;
      background: #181818;
      color: var(--text-dim);
      border: 2px solid #2A2A2A;
      border-radius: 6px;
      cursor: pointer;
      box-shadow:
        inset 1px 1px 0 rgba(255,255,255,0.03),
        3px 3px 0 rgba(0,0,0,0.4);
      transition: all 0.1s;
    }

    .web-btn:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 rgba(0,0,0,0.2); }
    .web-btn:hover { background: var(--border); color: var(--text); }
    .web-btn.active { background: var(--purple); color: white; border-color: var(--purple); }

    /* ═══ SIDEBAR PANELS ═══ */
    .panels-row {
      width: 520px;
      display: flex;
      gap: 6px;
      margin-top: 6px;
      flex-shrink: 0;
    }

    .panel {
      flex: 1;
      background: #111111;
      border: 2px solid #222;
      border-radius: 8px;
      padding: 8px 10px;
      box-shadow:
        inset 1px 1px 0 rgba(255,255,255,0.02),
        3px 3px 0 rgba(0,0,0,0.4),
        0 0 20px rgba(155,188,15,0.02);
    }

    .panel-title {
      font-family: 'Press Start 2P', monospace;
      font-size: 6px;
      color: var(--text-muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 5px;
    }

    .log-panel { flex: 2; max-height: 130px; overflow-y: auto; }
    .inv-sidebar { flex: 1; max-height: 130px; overflow-y: auto; }

    .log-entry {
      font-family: 'VT323', monospace;
      font-size: 14px;
      color: var(--text-dim);
      padding: 1px 0;
      line-height: 1.2;
    }

    .inv-sidebar-item {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 3px 6px;
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      font-family: 'VT323', monospace;
      font-size: 13px;
      color: var(--text-dim);
      margin-bottom: 2px;
    }

    .inv-sidebar-item:hover { background: rgba(232,120,152,0.08); }
    .inv-sidebar-item.equipped { border-color: var(--blue); background: rgba(56,144,248,0.08); }
    .inv-sidebar-empty { font-family: 'Press Start 2P'; font-size: 6px; color: var(--text-muted); padding: 10px; text-align: center; }

    /* ═══ CONTROLS HINT ═══ */
    .controls-hint {
      width: 520px;
      text-align: center;
      font-family: 'Press Start 2P', monospace;
      font-size: 6px;
      color: rgba(168,130,247,0.3);
      margin-top: 4px;
      padding-bottom: 8px;
      display: none;
    }

    .controls-hint.show { display: block; }
    .controls-hint span { color: rgba(232,120,152,0.4); }

    /* ═══ SCROLLBAR ═══ */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(168,130,247,0.15); border-radius: 2px; }
  </style>
</head>
<body>

  <div class="app">

  <!-- ═══ DECORATIVE PIXEL CORNERS ═══ -->
  <div class="pixel-deco pixel-deco-tl"></div>
  <div class="pixel-deco pixel-deco-tr"></div>
  <div class="pixel-deco pixel-deco-bl"></div>
  <div class="pixel-deco pixel-deco-br"></div>

  <!-- ═══ GAMEBOY SHELL ═══ -->
  <div class="gameboy">
    <div class="gb-body">
      <div class="gb-screen-bezel">
        <div class="gb-brand">
          <span class="gb-brand-title">THREAD CRAWLER</span>
          <div class="gb-power">
            <div class="gb-power-led" id="power-led"></div>
            <span class="gb-power-text">POWER</span>
          </div>
        </div>

        <div class="gb-screen">
          <div class="gb-screen-content">
            <!-- HUD -->
            <div class="gb-hud">
              <div class="gb-hud-left">
                <span class="gb-hud-stat" id="hud-floor">F1</span>
                <div class="gb-depth-bar">
                  <div class="gb-depth-pip active"></div><div class="gb-depth-pip"></div><div class="gb-depth-pip"></div>
                  <div class="gb-depth-pip"></div><div class="gb-depth-pip"></div><div class="gb-depth-pip"></div><div class="gb-depth-pip"></div>
                </div>
              </div>
              <div class="gb-hud-right">
                <div class="gb-hud-stat">HP <div class="gb-hp-bar"><div class="gb-hp-fill" id="hp-fill" style="width:100%"></div></div></div>
                <div class="gb-hud-stat">XP <div class="gb-hp-bar" style="width:30px;"><div class="gb-hp-fill" id="xp-fill" style="width:0%;background:var(--blue);"></div></div></div>
                <span class="gb-hud-stat" id="hud-gold">G:0</span>
                <span class="gb-hud-stat" id="hud-level">Lv1</span>
              </div>
            </div>

            <!-- Status -->
            <div class="gb-status-bar" id="status-effects"></div>

            <!-- Game area -->
            <div class="gb-game-area" id="game-area">
              <div id="game-container"></div>

              <!-- Title -->
              <div class="overlay show" id="title-screen">
                <div class="pixel-icon">
                  <!-- Pixel art dungeon entrance -->
                  <svg viewBox="0 0 32 32" width="40" height="40" fill="none">
                    <rect x="6" y="4" width="20" height="4" fill="#4A3A6A"/>
                    <rect x="4" y="8" width="24" height="16" fill="#3A2A5A"/>
                    <rect x="4" y="8" width="4" height="16" fill="#4A3A6A"/>
                    <rect x="24" y="8" width="4" height="16" fill="#4A3A6A"/>
                    <rect x="12" y="14" width="8" height="10" fill="#1A1028"/>
                    <rect x="14" y="16" width="4" height="2" fill="#E87898"/>
                    <rect x="10" y="24" width="12" height="4" fill="#4A3A6A"/>
                    <!-- Steps -->
                    <rect x="8" y="24" width="16" height="2" fill="#2A1A44"/>
                    <rect x="6" y="26" width="20" height="2" fill="#221438"/>
                    <!-- Skull decoration -->
                    <rect x="14" y="6" width="4" height="2" fill="#A882F7"/>
                  </svg>
                </div>
                <h1>THREAD CRAWLER</h1>
                <p>Every comment is a room. Every reply is a path deeper. Explore procedurally generated dungeons.</p>
                <button class="btn-start" onclick="startGame()" style="font-family:'Press Start 2P';font-size:12px;padding:14px 36px;background:linear-gradient(135deg,var(--green),#38A838);color:white;border:none;border-radius:8px;cursor:pointer;box-shadow:0 4px 0 #288828,0 6px 20px rgba(72,200,72,0.3);">START</button>
              </div>

              <!-- Game Over -->
              <div class="overlay" id="gameover-screen">
                <h2 id="go-title">GAME OVER</h2>
                <div class="overlay-stats" id="go-stats"></div>
                <button onclick="restartGame()" style="font-family:'Press Start 2P';font-size:12px;padding:14px 36px;background:linear-gradient(135deg,var(--pink),#D46888);color:white;border:none;border-radius:8px;cursor:pointer;box-shadow:0 4px 0 #A04868,0 6px 20px rgba(232,120,152,0.3);">RETRY</button>
              </div>

              <!-- Inventory overlay -->
              <div class="inv-overlay" id="inventory-panel">
                <div class="inv-title">BAG <span id="inv-count">0</span>/12</div>
                <div class="inv-grid" id="inventory-items"></div>
                <button onclick="toggleInventory()" style="font-family:'Press Start 2P';font-size:8px;padding:8px 16px;background:var(--bg-card2);color:var(--text);border:2px solid var(--border);border-radius:6px;cursor:pointer;margin-top:12px;">CLOSE</button>
              </div>

              <!-- Transition -->
              <div class="gb-transition" id="gb-transition"></div>
            </div>

            <!-- Text box -->
            <div class="gb-textbox">
              <div class="gb-textbox-title">LOG</div>
              <div class="gb-textbox-log" id="game-log">
                <div class="log-entry" style="color:rgba(255,255,255,0.2);">Press START...</div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- GB Controls -->
      <div class="gb-controls-area">
        <div class="gb-dpad">
          <button class="gb-dpad-btn gb-dpad-up" data-key="up"></button>
          <button class="gb-dpad-btn gb-dpad-down" data-key="down"></button>
          <button class="gb-dpad-btn gb-dpad-left" data-key="left"></button>
          <button class="gb-dpad-btn gb-dpad-right" data-key="right"></button>
          <div class="gb-dpad-center"></div>
        </div>
        <div class="gb-ab-area">
          <div class="gb-ab-wrap"><button class="gb-ab-btn" data-key="b">B</button><div class="gb-ab-label">B</div></div>
          <div class="gb-ab-wrap"><button class="gb-ab-btn" data-key="a">A</button><div class="gb-ab-label">A</div></div>
        </div>
      </div>

      <div class="gb-ss-area">
        <div class="gb-ss-wrap"><button class="gb-ss-btn" data-key="select"></button><div class="gb-ss-label">SELECT</div></div>
        <div class="gb-ss-wrap"><button class="gb-ss-btn" data-key="start"></button><div class="gb-ss-label">START</div></div>
      </div>

      <div class="gb-nintendo-seal">
        <div class="gb-seal-star">★</div>
      </div>

      <div class="gb-speaker">
        <div class="gb-speaker-line"></div><div class="gb-speaker-line"></div><div class="gb-speaker-line"></div>
        <div class="gb-speaker-line"></div><div class="gb-speaker-line"></div><div class="gb-speaker-line"></div>
        <div class="gb-speaker-line"></div>
      </div>
    </div>
  </div>

  <!-- ═══ WEB UI BAR ═══ -->
  <div class="web-bar">
    <button class="web-btn" onclick="toggleInventory()">BAG (I)</button>
    <button class="web-btn" id="btn-mute" onclick="toggleMute()">MUTE</button>
    <div style="flex:1;"></div>
    <div class="depth-bar" style="align-items:center;">
      <span style="font-family:'Press Start 2P';font-size:7px;color:var(--text-muted);margin-right:6px;">FLOOR</span>
      <span style="font-family:'Press Start 2P';font-size:8px;color:var(--text-dim);" id="depth-text">F1 / 7</span>
    </div>
  </div>

  <!-- ═══ SIDEBAR PANELS ═══ -->
  <div class="panels-row">
    <div class="panel inv-sidebar">
      <div class="panel-title">BAG</div>
      <div id="sidebar-inventory"><div class="inv-sidebar-empty">Empty</div></div>
    </div>
    <div class="panel log-panel">
      <div class="panel-title">ACTIVITY LOG</div>
      <div id="sidebar-log"></div>
    </div>
  </div>

  <!-- ═══ CONTROLS HINT ═══ -->
  <div class="controls-hint" id="controls-hint">
    <span>WASD</span> Move · <span>SPACE</span> Attack · <span>E</span> Exit · <span>I</span> Bag
  </div>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  <script>
    window.onerror = function(msg, url, line) {
      const el = document.getElementById('game-container');
      if (el) el.innerHTML = '<div style="padding:20px;text-align:center;"><p style="font-family:Press Start 2P;font-size:8px;color:#E83838;">ERROR</p><p style="font-family:VT323;font-size:14px;color:#A090C0;margin-top:6px;">'+msg+'</p></div>';
    };
  </script>
  <script src="game.js"></script>

  <script>
    // Touch D-Pad
    document.querySelectorAll('.gb-dpad-btn,.gb-ab-btn,.gb-ss-btn').forEach(btn => {
      const key = btn.dataset.key;
      if (!key) return;
      const map = {up:'ArrowUp',down:'ArrowDown',left:'ArrowLeft',right:'ArrowRight',a:' ',b:'e',start:'Enter',select:'Tab'};
      const fire = t => { const k = map[key]; if (k) window.dispatchEvent(new KeyboardEvent(t, {key:k, code:k===' '?'Space':k, bubbles:true})); };
      btn.addEventListener('touchstart', e => { e.preventDefault(); fire('keydown'); });
      btn.addEventListener('touchend', e => { e.preventDefault(); fire('keyup'); });
      btn.addEventListener('mousedown', () => fire('keydown'));
      btn.addEventListener('mouseup', () => fire('keyup'));
      btn.addEventListener('mouseleave', () => fire('keyup'));
    });

    // Power LED
    setTimeout(() => document.getElementById('power-led').classList.add('on'), 300);

    // Web UI
    let muted = false;

    function toggleInventory() {
      const p = document.getElementById('inventory-panel');
      p.classList.toggle('show');
      if (p.classList.contains('show')) {
        document.getElementById('inv-count').textContent = state.player.inventory.length;
        updateInventoryUI();
      }
    }

    function toggleMute() {
      muted = !muted;
      document.getElementById('btn-mute').classList.toggle('active', muted);
      if (audioCtx) { muted ? audioCtx.suspend() : audioCtx.resume(); }
    }

    function syncSidebarInventory() {
      const el = document.getElementById('sidebar-inventory');
      if (!el) return;
      const p = state.player;
      if (p.inventory.length === 0) { el.innerHTML = '<div class="inv-sidebar-empty">Empty</div>'; return; }
      el.innerHTML = p.inventory.map((item, i) => `
        <div class="inv-sidebar-item ${p.equipped===item.id?'equipped':''}" onclick="useItem(${i})" title="${item.desc}">
          <span>${item.icon}</span>
          <span>${item.name}</span>
          ${p.equipped===item.id?'<span style="font-family:Press Start 2P;font-size:5px;color:var(--blue);margin-left:auto;">E</span>':''}
        </div>
      `).join('');
    }

    function syncSidebarLog() {
      const el = document.getElementById('sidebar-log');
      if (!el || !state || !state.log) return;
      el.innerHTML = state.log.slice(-8).map(l => `<div class="log-entry">${l}</div>`).join('');
      el.scrollTop = el.scrollHeight;
    }
  </script>
  </div><!-- /.app -->
</body>
</html>
