<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thread Crawler — Game Boy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      /* DMG-01 authentic palette */
      --gb-body: #C4CFA1;
      --gb-body-light: #D4DFAE;
      --gb-body-dark: #A4AF84;
      --gb-body-shadow: #8A946A;
      --gb-screen-bg: #9BBC0F;
      --gb-screen-light: #8BAC0F;
      --gb-screen-mid: #306230;
      --gb-screen-dark: #0F380F;
      --gb-bezel: #65655B;
      --gb-bezel-light: #7A7A70;
      --gb-bezel-dark: #4A4A42;
      --gb-label: #5A5A50;
      --gb-power-led: #FF2020;
      --gb-speaker-grille: #A4AF84;
      --gb-accent-purple: #705090;
      --gb-accent-blue: #3890F8;
      --gb-accent-red: #E83838;
      --gb-accent-green: #48A848;
      --gb-accent-yellow: #F8D838;
      --gb-accent-pink: #E87898;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'VT323', monospace;
      background: #2C2C3A;
      background-image:
        radial-gradient(ellipse at 50% 30%, #3A3A4A 0%, #2C2C3A 70%),
        repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.01) 2px, rgba(255,255,255,0.01) 4px);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      image-rendering: pixelated;
      -webkit-font-smoothing: none;
    }

    /* ═══════════════════════════════════════════════════════
       GAME BOY DMG-01 SHELL
       ═══════════════════════════════════════════════════════ */
    .gameboy {
      width: 320px;
      position: relative;
      user-select: none;
    }

    /* ─── BODY ─── */
    .gb-body {
      background: linear-gradient(180deg, var(--gb-body-light) 0%, var(--gb-body) 20%, var(--gb-body-dark) 100%);
      border-radius: 12px 12px 12px 80px;
      padding: 16px 16px 80px;
      box-shadow:
        /* inner highlight */
        inset 2px 2px 0 rgba(255,255,255,0.25),
        inset -2px -2px 0 rgba(0,0,0,0.08),
        /* outer shadow */
        0 4px 0 var(--gb-body-shadow),
        0 6px 0 var(--gb-body-shadow),
        0 8px 20px rgba(0,0,0,0.4),
        /* depth */
        6px 0 0 var(--gb-body-dark),
        -4px 0 0 var(--gb-body-light);
      position: relative;
    }

    /* ─── DOT MATRIX LABEL ─── */
    .gb-dot-matrix-label {
      position: absolute;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Press Start 2P', monospace;
      font-size: 4px;
      color: var(--gb-label);
      letter-spacing: 2px;
      text-transform: uppercase;
      white-space: nowrap;
      opacity: 0.6;
    }

    /* ─── SCREEN BEZEL ─── */
    .gb-screen-bezel {
      background: linear-gradient(135deg, var(--gb-bezel-light), var(--gb-bezel), var(--gb-bezel-dark));
      border-radius: 10px 10px 10px 40px;
      padding: 16px 16px 8px 16px;
      margin-top: 18px;
      box-shadow:
        inset 2px 2px 0 rgba(255,255,255,0.1),
        inset -2px -2px 0 rgba(0,0,0,0.2),
        0 2px 4px rgba(0,0,0,0.3);
      position: relative;
    }

    /* ─── BRAND AREA ─── */
    .gb-brand {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
      padding-left: 4px;
    }

    .gb-brand-text {
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      color: #9090A0;
      letter-spacing: 1px;
    }

    .gb-brand-model {
      font-family: 'Press Start 2P', monospace;
      font-size: 5px;
      color: #707080;
      margin-left: auto;
      letter-spacing: 1px;
    }

    /* ─── POWER LED ─── */
    .gb-power-indicator {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 6px;
    }

    .gb-power-led {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #333;
      border: 1px solid #222;
      transition: all 0.3s;
    }

    .gb-power-led.on {
      background: var(--gb-power-led);
      box-shadow: 0 0 6px var(--gb-power-led), 0 0 12px rgba(255,32,32,0.3);
    }

    .gb-power-text {
      font-family: 'Press Start 2P', monospace;
      font-size: 4px;
      color: #606070;
      letter-spacing: 1px;
    }

    /* ─── SCREEN ─── */
    .gb-screen {
      background: var(--gb-screen-bg);
      border-radius: 4px;
      border: 3px solid #2A2A2A;
      box-shadow:
        inset 0 0 20px rgba(0,0,0,0.15),
        inset 0 0 4px rgba(0,0,0,0.1);
      overflow: hidden;
      position: relative;
      aspect-ratio: 10/9;
    }

    /* Scanline overlay */
    .gb-screen::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 1px,
        rgba(0,0,0,0.03) 1px,
        rgba(0,0,0,0.03) 2px
      );
      pointer-events: none;
      z-index: 50;
    }

    /* Screen glass reflection */
    .gb-screen::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(
        135deg,
        rgba(255,255,255,0.08) 0%,
        transparent 40%,
        transparent 60%,
        rgba(255,255,255,0.03) 100%
      );
      pointer-events: none;
      z-index: 51;
    }

    /* ─── SCREEN CONTENT ─── */
    .gb-screen-content {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* ─── IN-SCREEN HUD ─── */
    .gb-hud {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 6px;
      background: rgba(15,56,15,0.15);
      border-bottom: 2px solid rgba(15,56,15,0.2);
      min-height: 24px;
    }

    .gb-hud-left {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .gb-hud-floor {
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      color: var(--gb-screen-dark);
    }

    .gb-hud-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .gb-hud-stat {
      font-family: 'Press Start 2P', monospace;
      font-size: 6px;
      color: var(--gb-screen-dark);
      display: flex;
      align-items: center;
      gap: 3px;
    }

    .gb-hp-bar {
      width: 40px; height: 6px;
      background: var(--gb-screen-light);
      border: 1px solid var(--gb-screen-dark);
      overflow: hidden;
    }

    .gb-hp-fill {
      height: 100%;
      background: var(--gb-screen-dark);
      transition: width 0.3s;
    }

    /* ─── GAME AREA ─── */
    .gb-game-area {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    #game-container {
      width: 100%;
      height: 100%;
    }

    #game-container canvas {
      width: 100% !important;
      height: 100% !important;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    /* ─── TEXT BOX (bottom of screen, Pokemon dialogue style) ─── */
    .gb-textbox {
      background: var(--gb-screen-bg);
      border-top: 3px solid var(--gb-screen-dark);
      padding: 4px 6px;
      min-height: 36px;
      max-height: 60px;
      overflow-y: auto;
      position: relative;
    }

    .gb-textbox::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: repeating-linear-gradient(90deg,
        var(--gb-screen-dark) 0px, var(--gb-screen-dark) 3px,
        var(--gb-screen-mid) 3px, var(--gb-screen-mid) 6px
      );
    }

    .gb-textbox-title {
      font-family: 'Press Start 2P', monospace;
      font-size: 6px;
      color: var(--gb-screen-mid);
      margin-bottom: 2px;
    }

    .gb-textbox-log {
      font-family: 'VT323', monospace;
      font-size: 13px;
      color: var(--gb-screen-dark);
      line-height: 1.2;
    }

    .gb-textbox-log .log-entry {
      padding: 1px 0;
    }

    /* ─── ARROW INDICATOR ─── */
    .gb-textbox-arrow {
      position: absolute;
      bottom: 4px;
      right: 6px;
      width: 0; height: 0;
      border-left: 4px solid transparent;
      border-right: 4px solid transparent;
      border-top: 5px solid var(--gb-screen-dark);
      animation: blink-arrow 0.8s steps(1) infinite;
    }

    @keyframes blink-arrow {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }

    /* ─── SCREEN LABELS ─── */
    .gb-screen-label {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Press Start 2P', monospace;
      font-size: 10px;
      color: var(--gb-screen-dark);
      text-align: center;
      z-index: 10;
      pointer-events: none;
    }

    .gb-screen-label h1 {
      font-size: 12px;
      margin-bottom: 8px;
      text-shadow: 2px 2px 0 var(--gb-screen-mid);
      animation: title-bounce 2s ease-in-out infinite;
    }

    @keyframes title-bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }

    .gb-screen-label p {
      font-size: 7px;
      margin-bottom: 12px;
      color: var(--gb-screen-mid);
    }

    .gb-screen-label .blink {
      animation: blink-text 1s steps(1) infinite;
    }

    @keyframes blink-text {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }

    /* ─── DEPTH PIPS ─── */
    .gb-depth-bar {
      display: flex;
      gap: 2px;
      align-items: center;
    }

    .gb-depth-pip {
      width: 6px; height: 6px;
      border: 1px solid var(--gb-screen-dark);
      background: transparent;
    }

    .gb-depth-pip.active {
      background: var(--gb-screen-dark);
    }

    .gb-depth-pip.visited {
      background: var(--gb-screen-mid);
    }

    /* ─── NINTENDO SEAL ─── */
    .gb-seal {
      position: absolute;
      bottom: 52px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Press Start 2P', monospace;
      font-size: 4px;
      color: var(--gb-body-shadow);
      text-align: center;
      letter-spacing: 1px;
      line-height: 1.6;
    }

    .gb-seal-circle {
      width: 24px; height: 24px;
      border: 1.5px solid var(--gb-body-shadow);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 2px;
      font-size: 6px;
      font-weight: bold;
    }

    /* ═══════════════════════════════════════════════════════
       BUTTONS
       ═══════════════════════════════════════════════════════ */

    /* ─── D-PAD ─── */
    .gb-dpad-area {
      position: absolute;
      bottom: 24px;
      left: 20px;
    }

    .gb-dpad {
      position: relative;
      width: 66px;
      height: 66px;
    }

    .gb-dpad-btn {
      position: absolute;
      background: linear-gradient(180deg, #3A3A3A, #2A2A2A);
      border: none;
      cursor: pointer;
      box-shadow:
        inset 1px 1px 0 rgba(255,255,255,0.1),
        inset -1px -1px 0 rgba(0,0,0,0.3),
        0 2px 0 #1A1A1A;
      transition: all 0.05s;
    }

    .gb-dpad-btn:active {
      box-shadow:
        inset 1px 1px 0 rgba(0,0,0,0.3),
        inset -1px -1px 0 rgba(255,255,255,0.1),
        0 1px 0 #1A1A1A;
      transform: translateY(1px);
    }

    .gb-dpad-up {
      top: 0; left: 22px;
      width: 22px; height: 22px;
      border-radius: 4px 4px 0 0;
    }

    .gb-dpad-down {
      bottom: 0; left: 22px;
      width: 22px; height: 22px;
      border-radius: 0 0 4px 4px;
    }

    .gb-dpad-left {
      top: 22px; left: 0;
      width: 22px; height: 22px;
      border-radius: 4px 0 0 4px;
    }

    .gb-dpad-right {
      top: 22px; right: 0;
      width: 22px; height: 22px;
      border-radius: 0 4px 4px 0;
    }

    .gb-dpad-center {
      position: absolute;
      top: 22px; left: 22px;
      width: 22px; height: 22px;
      background: #2A2A2A;
    }

    /* D-pad arrows */
    .gb-dpad-btn::after {
      content: '';
      position: absolute;
      width: 0; height: 0;
    }

    .gb-dpad-up::after {
      top: 6px; left: 50%;
      transform: translateX(-50%);
      border-left: 4px solid transparent;
      border-right: 4px solid transparent;
      border-bottom: 5px solid #666;
    }

    .gb-dpad-down::after {
      bottom: 6px; left: 50%;
      transform: translateX(-50%);
      border-left: 4px solid transparent;
      border-right: 4px solid transparent;
      border-top: 5px solid #666;
    }

    .gb-dpad-left::after {
      left: 6px; top: 50%;
      transform: translateY(-50%);
      border-top: 4px solid transparent;
      border-bottom: 4px solid transparent;
      border-right: 5px solid #666;
    }

    .gb-dpad-right::after {
      right: 6px; top: 50%;
      transform: translateY(-50%);
      border-top: 4px solid transparent;
      border-bottom: 4px solid transparent;
      border-left: 5px solid #666;
    }

    /* ─── A/B BUTTONS ─── */
    .gb-ab-area {
      position: absolute;
      bottom: 28px;
      right: 18px;
      display: flex;
      gap: 8px;
      transform: rotate(-25deg);
    }

    .gb-ab-btn {
      width: 30px; height: 30px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      font-family: 'Press Start 2P', monospace;
      font-size: 6px;
      color: rgba(255,255,255,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow:
        inset 2px 2px 0 rgba(255,255,255,0.15),
        inset -2px -2px 0 rgba(0,0,0,0.2),
        0 3px 0 #6A2040,
        0 4px 6px rgba(0,0,0,0.3);
      transition: all 0.05s;
    }

    .gb-ab-btn:active {
      box-shadow:
        inset 2px 2px 0 rgba(0,0,0,0.2),
        inset -2px -2px 0 rgba(255,255,255,0.1),
        0 1px 0 #6A2040;
      transform: translateY(2px);
    }

    .gb-btn-a {
      background: linear-gradient(180deg, #A0325A, #8A2048);
      margin-top: 10px;
    }

    .gb-btn-b {
      background: linear-gradient(180deg, #A0325A, #8A2048);
    }

    /* ─── START/SELECT ─── */
    .gb-start-select-area {
      position: absolute;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%) rotate(-25deg);
      display: flex;
      gap: 12px;
    }

    .gb-ss-btn {
      width: 20px; height: 8px;
      border-radius: 4px;
      background: linear-gradient(180deg, #8A8A7A, #6A6A5A);
      border: none;
      cursor: pointer;
      box-shadow:
        inset 1px 1px 0 rgba(255,255,255,0.1),
        0 2px 0 #4A4A3A;
      transition: all 0.05s;
    }

    .gb-ss-btn:active {
      box-shadow: 0 1px 0 #4A4A3A;
      transform: translateY(1px);
    }

    .gb-ss-label {
      font-family: 'Press Start 2P', monospace;
      font-size: 4px;
      color: var(--gb-body-shadow);
      text-align: center;
      margin-top: 3px;
      letter-spacing: 1px;
    }

    /* ─── SPEAKER GRILLE ─── */
    .gb-speaker {
      position: absolute;
      bottom: 20px;
      right: -4px;
      width: 30px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      transform: rotate(-30deg);
    }

    .gb-speaker-line {
      height: 2px;
      background: var(--gb-body-shadow);
      border-radius: 1px;
      opacity: 0.5;
    }

    /* ─── CARTRIDGE SLOT ─── */
    .gb-cart-slot {
      position: absolute;
      top: -4px;
      left: 50%;
      transform: translateX(-50%);
      width: 80px;
      height: 8px;
      background: #2A2A2A;
      border-radius: 0 0 4px 4px;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
    }

    /* ═══════════════════════════════════════════════════════
       GAME OVER / VICTORY OVERLAY
       ═══════════════════════════════════════════════════════ */
    .gb-overlay {
      position: absolute;
      inset: 0;
      background: var(--gb-screen-bg);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 40;
    }

    .gb-overlay.show { display: flex; }

    .gb-overlay h2 {
      font-family: 'Press Start 2P', monospace;
      font-size: 12px;
      color: var(--gb-screen-dark);
      margin-bottom: 12px;
      text-shadow: 2px 2px 0 var(--gb-screen-mid);
    }

    .gb-overlay-stats {
      font-family: 'VT323', monospace;
      font-size: 14px;
      color: var(--gb-screen-dark);
      margin-bottom: 16px;
      line-height: 1.6;
      text-align: center;
    }

    .gb-overlay-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      background: var(--gb-screen-dark);
      color: var(--gb-screen-bg);
      border: none;
      padding: 8px 16px;
      cursor: pointer;
      box-shadow: 2px 2px 0 var(--gb-screen-mid);
      animation: blink-text 1.2s steps(1) infinite;
    }

    .gb-overlay-btn:active {
      transform: translate(1px, 1px);
      box-shadow: 1px 1px 0 var(--gb-screen-mid);
    }

    /* ═══════════════════════════════════════════════════════
       INVENTORY OVERLAY
       ═══════════════════════════════════════════════════════ */
    .gb-inventory {
      position: absolute;
      inset: 0;
      background: var(--gb-screen-bg);
      display: none;
      flex-direction: column;
      z-index: 30;
      padding: 6px;
    }

    .gb-inventory.show { display: flex; }

    .gb-inv-title {
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      color: var(--gb-screen-dark);
      padding: 4px 0;
      border-bottom: 2px solid var(--gb-screen-dark);
      margin-bottom: 4px;
    }

    .gb-inv-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3px;
      flex: 1;
      overflow-y: auto;
    }

    .gb-inv-item {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 3px 5px;
      background: var(--gb-screen-light);
      border: 2px solid var(--gb-screen-mid);
      cursor: pointer;
      font-family: 'VT323', monospace;
      font-size: 12px;
      color: var(--gb-screen-dark);
    }

    .gb-inv-item:hover {
      background: var(--gb-screen-mid);
      color: var(--gb-screen-bg);
    }

    .gb-inv-item.equipped {
      border-color: var(--gb-screen-dark);
      background: var(--gb-screen-mid);
      color: var(--gb-screen-bg);
    }

    .gb-inv-icon {
      font-size: 14px;
      width: 16px;
      text-align: center;
    }

    .gb-inv-empty {
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      color: var(--gb-screen-mid);
      text-align: center;
      padding: 20px;
    }

    /* ─── STATUS EFFECTS ─── */
    .gb-status-bar {
      display: flex;
      gap: 3px;
      padding: 2px 0;
    }

    .gb-status-badge {
      font-family: 'Press Start 2P', monospace;
      font-size: 5px;
      padding: 1px 3px;
      border: 1px solid var(--gb-screen-dark);
      color: var(--gb-screen-dark);
    }

    /* ─── CONTROLS HINT (tiny, at very bottom) ─── */
    .gb-controls-hint {
      position: fixed;
      bottom: 4px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Press Start 2P', monospace;
      font-size: 5px;
      color: rgba(255,255,255,0.2);
      display: none;
      gap: 8px;
      z-index: 200;
    }

    .gb-controls-hint.show { display: flex; }

    /* ─── SCREEN TRANSITION ─── */
    .gb-transition {
      position: absolute;
      inset: 0;
      background: var(--gb-screen-dark);
      z-index: 60;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .gb-transition.active { opacity: 1; }
  </style>
</head>
<body>

  <div class="gameboy">
    <div class="gb-body">
      <!-- Cartridge slot -->
      <div class="gb-cart-slot"></div>

      <!-- Dot Matrix label -->
      <div class="gb-dot-matrix-label">DOT MATRIX WITH STEREO SOUND</div>

      <!-- Screen bezel -->
      <div class="gb-screen-bezel">
        <!-- Brand -->
        <div class="gb-brand">
          <span class="gb-brand-text">Nintendo</span>
          <span class="gb-brand-model">DMG-01</span>
        </div>

        <!-- Power LED -->
        <div class="gb-power-indicator">
          <div class="gb-power-led" id="power-led"></div>
          <span class="gb-power-text">POWER</span>
        </div>

        <!-- SCREEN -->
        <div class="gb-screen" id="gb-screen">

                </div>

              <!-- Title overlay -->

          <!-- Screen transition -->
          <div class="gb-transition" id="gb-transition"></div>

      <!-- Nintendo Seal -->
      <div class="gb-seal">

      <!-- D-Pad -->
      <div class="gb-dpad-area">

          <button class="gb-dpad-btn gb-dpad-up" data-key="up"></button>

        <div style="text-align:center;">
          <button class="gb-ab-btn gb-btn-a" data-key="a">A</button>

      <!-- Start/Select -->
      <div class="gb-start-select-area">
        <div style="text-align:center;">
          <button class="gb-ss-btn" data-key="select"></button>

        </div>

          <button class="gb-ss-btn" data-key="start"></button>

      <div class="gb-speaker">

        <div class="gb-speaker-line"></div>
        <div class="gb-speaker-line"></div>
        <div class="gb-speaker-line"></div>
        <div class="gb-speaker-line"></div>
        <div class="gb-speaker-line"></div>
      </div>
    </div>
  </div>

  <!-- Controls hint -->
  <div class="gb-controls-hint" id="controls-hint">
    <span>WASD</span> Move
    <span>SPACE</span> Attack
    <span>E</span> Exit
    <span>I</span> Bag
  </div>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  <script>
    window.onerror = function(msg, url, line) {
      document.getElementById('game-area').innerHTML = '<div style="padding:20px;text-align:center;font-family:monospace;"><p style="font-size:10px;color:var(--gb-screen-dark);">ERROR</p><p style="font-size:8px;color:var(--gb-screen-mid);">' + msg + '</p></div>';
    };
  </script>
  <script src="game.js"></script>

  <script>
    // ─── TOUCH D-PAD SUPPORT ───────────────────────────────────
    document.querySelectorAll('.gb-dpad-btn, .gb-ab-btn, .gb-ss-btn').forEach(btn => {
      const key = btn.dataset.key;
      if (!key) return;

      const keyMap = {
        'up': 'ArrowUp', 'down': 'ArrowDown', 'left': 'ArrowLeft', 'right': 'ArrowRight',
        'a': ' ', 'b': 'e', 'start': 'Enter', 'select': 'Tab'
      };

      const dispatchKey = (type) => {
        const mapped = keyMap[key];
        if (!mapped) return;
        window.dispatchEvent(new KeyboardEvent(type, { key: mapped, code: mapped === ' ' ? 'Space' : mapped, bubbles: true }));
      };

      btn.addEventListener('touchstart', (e) => { e.preventDefault(); dispatchKey('keydown'); btn.style.opacity = '0.7'; });
      btn.addEventListener('touchend', (e) => { e.preventDefault(); dispatchKey('keyup'); btn.style.opacity = '1'; });
      btn.addEventListener('mousedown', (e) => { dispatchKey('keydown'); });
      btn.addEventListener('mouseup', (e) => { dispatchKey('keyup'); });
      btn.addEventListener('mouseleave', (e) => { dispatchKey('keyup'); });
    });

    // Power LED
    setTimeout(() => {
      document.getElementById('power-led').classList.add('on');
    }, 500);
  </script>
</body>
</html>
