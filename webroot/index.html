<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thread Crawler</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0C0C1A;
      --bg-card: #141428;
      --bg-card-hover: #1A1A34;
      --border: #2A2A4A;
      --border-light: #3A3A5A;
      --text: #E0D8F0;
      --text-dim: #8880A8;
      --text-muted: #5A5278;
      --accent-pink: #E87898;
      --accent-purple: #A882F7;
      --accent-blue: #3890F8;
      --accent-green: #48C848;
      --accent-red: #E83838;
      --accent-yellow: #F8D838;
      --accent-gold: #F8B800;
      --hp-green: #48C848;
      --hp-red: #E83838;
    }

    html, body { height: 100%; }

    body {
      font-family: 'VT323', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      image-rendering: pixelated;
    }

    /* ─── BACKGROUND ─── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 30% 20%, rgba(168,130,247,0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 70% 80%, rgba(232,120,152,0.04) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(56,144,248,0.03) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* ─── MAIN LAYOUT ─── */
    .app {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 12px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* ─── HEADER ─── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--accent-pink), var(--accent-purple));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 16px rgba(232,120,152,0.3);
    }

    .logo-icon svg { width: 16px; height: 16px; }

    .logo-text {
      font-family: 'Press Start 2P', monospace;
      font-size: 10px;
      color: var(--text);
    }

    .logo-sub {
      font-family: 'VT323', monospace;
      font-size: 14px;
      color: var(--text-dim);
    }

    /* ─── STATS BAR ─── */
    .stats-bar {
      display: flex;
      gap: 16px;
      align-items: center;
    }

    .stat {
      display: flex;
      align-items: center;
      gap: 5px;
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      color: var(--text-dim);
    }

    .stat-icon {
      width: 8px; height: 8px;
      border-radius: 2px;
    }

    .stat-hp .stat-icon { background: var(--hp-green); box-shadow: 0 0 6px rgba(72,200,72,0.4); }
    .stat-gold .stat-icon { background: var(--accent-gold); box-shadow: 0 0 6px rgba(248,184,0,0.4); }
    .stat-xp .stat-icon { background: var(--accent-blue); box-shadow: 0 0 6px rgba(56,144,248,0.4); }

    .stat-bar {
      width: 70px; height: 8px;
      background: rgba(255,255,255,0.06);
      border-radius: 4px;
      overflow: hidden;
    }

    .stat-bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.3s;
    }

    .stat-hp .stat-bar-fill { background: linear-gradient(90deg, var(--hp-green), #68E868); box-shadow: 0 0 8px rgba(72,200,72,0.3); }
    .stat-xp .stat-bar-fill { background: linear-gradient(90deg, var(--accent-blue), #58A8FF); }

    /* ─── GAME CONTAINER ─── */
    .game-wrapper {
      flex: 1;
      display: flex;
      gap: 10px;
      min-height: 0;
    }

    .game-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-width: 0;
    }

    .game-screen {
      flex: 1;
      background: var(--bg-card);
      border: 2px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      position: relative;
      min-height: 500px;
    }

    #game-container {
      width: 100%;
      height: 100%;
    }

    #game-container canvas {
      width: 100% !important;
      height: 100% !important;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    /* ─── OVERLAYS ─── */
    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(12,12,26,0.95);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 40;
      border-radius: 8px;
    }

    .overlay.show { display: flex; }

    .overlay h1 {
      font-family: 'Press Start 2P', monospace;
      font-size: 22px;
      color: var(--accent-pink);
      margin-bottom: 8px;
      text-shadow: 0 0 20px rgba(232,120,152,0.3);
    }

    .overlay h2 {
      font-family: 'Press Start 2P', monospace;
      font-size: 18px;
      color: var(--accent-red);
      margin-bottom: 12px;
      text-shadow: 0 0 20px rgba(232,56,56,0.3);
    }

    .overlay p {
      font-family: 'VT323', monospace;
      font-size: 18px;
      color: var(--text-dim);
      max-width: 400px;
      text-align: center;
      line-height: 1.5;
      margin-bottom: 20px;
    }

    .overlay .pixel-art {
      width: 64px; height: 64px;
      margin-bottom: 20px;
      background: linear-gradient(135deg, var(--accent-pink), var(--accent-purple));
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 24px rgba(232,120,152,0.3);
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    .overlay-stats {
      font-family: 'VT323', monospace;
      font-size: 18px;
      color: var(--text-dim);
      line-height: 1.8;
      text-align: center;
      margin-bottom: 20px;
    }

    /* ─── BUTTONS ─── */
    .btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 10px;
      padding: 12px 28px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
      box-shadow: 0 3px 0 rgba(0,0,0,0.3);
    }

    .btn:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 rgba(0,0,0,0.3);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent-pink), #D46888);
      color: white;
      box-shadow: 0 3px 0 #A04868, 0 4px 16px rgba(232,120,152,0.3);
    }

    .btn-primary:hover { background: linear-gradient(135deg, #F088A8, var(--accent-pink)); }

    .btn-secondary {
      background: var(--bg-card);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover { background: var(--bg-card-hover); }

    .btn-small {
      font-size: 8px;
      padding: 8px 14px;
    }

    .btn-start {
      font-size: 14px;
      padding: 16px 40px;
      background: linear-gradient(135deg, var(--accent-green), #38A838);
      color: white;
      box-shadow: 0 4px 0 #288828, 0 6px 24px rgba(72,200,72,0.3);
    }

    .btn-start:hover { background: linear-gradient(135deg, #58D858, var(--accent-green)); }

    /* ─── SIDEBAR ─── */
    .sidebar {
      width: 240px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
    }

    .panel {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
    }

    .panel-title {
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      color: var(--text-muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    /* ─── LOG ─── */
    .log-panel {
      flex: 1;
      min-height: 120px;
      max-height: 200px;
      overflow-y: auto;
    }

    .log-entry {
      font-family: 'VT323', monospace;
      font-size: 15px;
      color: var(--text-dim);
      padding: 2px 0;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      line-height: 1.3;
    }

    /* ─── INVENTORY ─── */
    .inv-panel {
      max-height: 250px;
      overflow-y: auto;
    }

    .inv-grid {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .inv-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 8px;
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
      font-family: 'VT323', monospace;
      font-size: 14px;
      color: var(--text-dim);
    }

    .inv-item:hover {
      background: rgba(232,120,152,0.08);
      border-color: rgba(232,120,152,0.2);
    }

    .inv-item.equipped {
      background: rgba(56,144,248,0.08);
      border-color: rgba(56,144,248,0.3);
    }

    .inv-icon { font-size: 16px; width: 20px; text-align: center; }

    .inv-equipped {
      font-family: 'Press Start 2P', monospace;
      font-size: 6px;
      color: var(--accent-blue);
      background: rgba(56,144,248,0.15);
      padding: 1px 4px;
      border-radius: 3px;
      margin-left: auto;
    }

    .inv-empty {
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      color: var(--text-muted);
      text-align: center;
      padding: 16px;
    }

    /* ─── STATUS EFFECTS ─── */
    .status-bar {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }

    .status-badge {
      font-family: 'Press Start 2P', monospace;
      font-size: 6px;
      padding: 2px 6px;
      border-radius: 4px;
      border: 1px solid;
    }

    /* ─── DEPTH BAR ─── */
    .depth-bar {
      display: flex;
      gap: 3px;
      align-items: center;
    }

    .depth-pip {
      width: 8px; height: 8px;
      border-radius: 2px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
    }

    .depth-pip.active {
      background: var(--accent-pink);
      border-color: var(--accent-pink);
      box-shadow: 0 0 8px rgba(232,120,152,0.4);
    }

    .depth-pip.visited {
      background: rgba(232,120,152,0.2);
      border-color: rgba(232,120,152,0.3);
    }

    .depth-text {
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      color: var(--text-dim);
      margin-left: auto;
    }

    /* ─── CONTROLS ─── */
    .controls-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
    }

    .controls-keys {
      display: flex;
      gap: 12px;
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      color: var(--text-muted);
    }

    .controls-keys span { color: var(--accent-purple); }

    .controls-buttons {
      display: flex;
      gap: 6px;
    }

    /* ─── SCROLLBAR ─── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(168,130,247,0.2); border-radius: 2px; }

    /* ─── TRANSITION ─── */
    .screen-transition {
      position: absolute;
      inset: 0;
      background: #000;
      z-index: 60;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      border-radius: 8px;
    }

    .screen-transition.active { opacity: 1; }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 800px) {
      .game-wrapper { flex-direction: column; }
      .sidebar { width: 100%; flex-direction: row; flex-wrap: wrap; }
      .sidebar .panel { flex: 1; min-width: 200px; }
    }
  </style>
</head>
<body>

  <div class="app">
    <!-- Header -->
    <div class="header">
      <div class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="white" stroke-width="2"><path d="M3 14V6l5-3 5 3v8"/><path d="M6 14V10h4v4"/></svg>
        </div>
        <div>
          <div class="logo-text">THREAD CRAWLER</div>
          <div class="logo-sub">Dungeon Adventure</div>
        </div>
      </div>
      <div class="stats-bar">
        <div class="stat stat-hp">
          <div class="stat-icon"></div>HP
          <div class="stat-bar"><div class="stat-bar-fill" id="hp-fill" style="width:100%"></div></div>
          <span id="hp-text">100/100</span>
        </div>
        <div class="stat stat-xp">
          <div class="stat-icon"></div>XP
          <div class="stat-bar" style="width:50px;"><div class="stat-bar-fill" id="xp-fill" style="width:0%"></div></div>
        </div>
        <div class="stat stat-gold"><div class="stat-icon"></div><span id="hud-gold">0</span>G</div>
        <div class="stat"><span id="hud-level">Lv.1</span></div>
      </div>
    </div>

    <!-- Main game area -->
    <div class="game-wrapper">
      <div class="game-main">
        <!-- Game screen -->
        <div class="game-screen" id="game-screen">
          <div id="game-container"></div>

          <!-- Title overlay -->
          <div class="overlay show" id="title-screen">
            <div class="pixel-art">
              <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="white" stroke-width="2"><path d="M3 21V8l9-5 9 5v13"/><path d="M9 21V13h6v8"/></svg>
            </div>
            <h1>THREAD CRAWLER</h1>
            <p>Every comment is a room. Every reply is a path deeper. Explore procedurally generated dungeons, fight monsters, and descend 7 floors.</p>
            <button class="btn btn-start" onclick="startGame()">START</button>
          </div>

          <!-- Game Over -->
          <div class="overlay" id="gameover-screen">
            <h2 id="go-title">GAME OVER</h2>
            <div class="overlay-stats" id="go-stats"></div>
            <button class="btn btn-start" onclick="restartGame()">RETRY</button>
          </div>

          <!-- Inventory overlay -->
          <div class="overlay" id="inventory-panel" style="background:rgba(12,12,26,0.92);">
            <h2 style="font-size:14px;margin-bottom:16px;">BAG <span id="inv-count">0</span>/12</h2>
            <div class="inv-grid" id="inventory-items" style="width:80%;max-width:400px;"></div>
            <button class="btn btn-secondary btn-small" style="margin-top:16px;" onclick="toggleInventory()">CLOSE</button>
          </div>

          <!-- Transition -->
          <div class="screen-transition" id="gb-transition"></div>
        </div>

        <!-- Bottom bar -->
        <div class="controls-bar">
          <div class="controls-keys">
            <span>WASD</span> Move
            <span>SPACE</span> Attack
            <span>E</span> Exit
            <span>I</span> Bag
          </div>
          <div class="controls-buttons">
            <button class="btn btn-secondary btn-small" onclick="toggleInventory()">BAG</button>
            <button class="btn btn-secondary btn-small" id="btn-mute" onclick="toggleMute()">MUTE</button>
          </div>
        </div>
      </div>

      <!-- Sidebar -->
      <div class="sidebar">
        <!-- Floor progress -->
        <div class="panel">
          <div class="panel-title">FLOOR</div>
          <div class="depth-bar" id="depth-bar">
            <div class="depth-pip active"></div><div class="depth-pip"></div><div class="depth-pip"></div>
            <div class="depth-pip"></div><div class="depth-pip"></div><div class="depth-pip"></div><div class="depth-pip"></div>
            <span class="depth-text" id="depth-text">F1 / 7</span>
          </div>
          <div class="status-bar" id="status-effects" style="margin-top:6px;"></div>
        </div>

        <!-- Inventory -->
        <div class="panel inv-panel">
          <div class="panel-title">BAG</div>
          <div class="inv-grid" id="sidebar-inventory"></div>
        </div>

        <!-- Activity Log -->
        <div class="panel log-panel">
          <div class="panel-title">LOG</div>
          <div id="game-log"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  <script>
    window.onerror = function(msg, url, line) {
      document.getElementById('game-container').innerHTML = '<div style="padding:40px;text-align:center;"><p style="font-family:Press Start 2P;font-size:10px;color:#E83838;">ERROR</p><p style="font-family:VT323;font-size:16px;color:#8880A8;margin-top:8px;">' + msg + '</p></div>';
    };
  </script>
  <script src="game.js"></script>

  <script>
    let muted = false;

    function toggleInventory() {
      const panel = document.getElementById('inventory-panel');
      panel.classList.toggle('show');
      if (panel.classList.contains('show')) {
        document.getElementById('inv-count').textContent = state.player.inventory.length;
        updateInventoryUI();
      }
    }

    function toggleMute() {
      muted = !muted;
      document.getElementById('btn-mute').classList.toggle('active', muted);
      if (audioCtx) {
        if (muted) audioCtx.suspend();
        else audioCtx.resume();
      }
    }

    // Keep sidebar inventory in sync
    function syncSidebarInventory() {
      const el = document.getElementById('sidebar-inventory');
      if (!el) return;
      const p = state.player;
      if (p.inventory.length === 0) {
        el.innerHTML = '<div class="inv-empty">Empty</div>';
        return;
      }
      el.innerHTML = p.inventory.map((item, i) => `
        <div class="inv-item ${p.equipped === item.id ? 'equipped' : ''}" onclick="useItem(${i})" title="${item.desc}">
          <span class="inv-icon">${item.icon}</span>
          <span>${item.name}</span>
          ${p.equipped === item.id ? '<span class="inv-equipped">EQUIPPED</span>' : ''}
        </div>
      `).join('');
    }
  </script>
</body>
</html>
