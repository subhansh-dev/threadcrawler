<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thread Crawler</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #010103;
      --glass: rgba(10,12,20,0.35);
      --glass-border: rgba(255,255,255,0.08);
      --glass-highlight: rgba(255,255,255,0.06);
      --accent: #E8829B;
      --accent-dim: rgba(232,130,155,0.15);
      --miku: #7EDDD6;
      --miku-dim: rgba(126,221,214,0.15);
      --lavender: #C4B5FD;
      --lavender-dim: rgba(196,181,253,0.15);
      --peach: #FDBA74;
      --sky: #93C5FD;
      --red: #EF4444;
      --green: #34D399;
      --text: #E8D5E0;
      --text-dim: #9B889E;
      --text-muted: #6B5070;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Space Grotesk', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ─── BACKGROUND ─── */
    .bg-layer {
      position: fixed; inset: 0; z-index: 0;
      background-image: url('bg.jpg');
      background-size: cover;
      background-position: center;
      filter: blur(30px) brightness(0.3) saturate(1.4);
      transform: scale(1.1);
    }

    .bg-overlay {
      position: fixed; inset: 0; z-index: 1;
      background: radial-gradient(ellipse at 50% 30%, rgba(232,130,155,0.06) 0%, transparent 60%),
                  radial-gradient(ellipse at 80% 70%, rgba(126,221,214,0.04) 0%, transparent 50%),
                  linear-gradient(180deg, rgba(1,1,3,0.7) 0%, rgba(1,1,3,0.85) 100%);
    }

    .bg-noise {
      position: fixed; inset: 0; z-index: 2;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/%3E%3C/svg%3E");
      pointer-events: none;
    }

    /* ─── GLASS SYSTEM ─── */
    .glass {
      background: var(--glass);
      backdrop-filter: blur(20px) saturate(1.5);
      -webkit-backdrop-filter: blur(20px) saturate(1.5);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3),
                  inset 0 1px 0 var(--glass-highlight);
      position: relative;
      overflow: hidden;
    }

    .glass::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, transparent 50%);
      pointer-events: none;
      border-radius: inherit;
    }

    .glass-heavy {
      background: rgba(10,12,20,0.55);
      backdrop-filter: blur(30px) saturate(1.8);
      -webkit-backdrop-filter: blur(30px) saturate(1.8);
    }

    .glass-pill {
      border-radius: 100px;
      padding: 6px 16px;
    }

    /* ─── APP LAYOUT ─── */
    .app {
      position: relative; z-index: 10;
      max-width: 520px;
      margin: 0 auto;
      padding: 12px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ─── HEADER ─── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      margin-bottom: 10px;
    }

    .logo {
      font-size: 15px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.3px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-icon {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, var(--accent), var(--miku));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      box-shadow: 0 0 20px rgba(232,130,155,0.3);
    }

    .stats-bar {
      display: flex;
      gap: 10px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-dim);
    }

    .stat {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .stat-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
    }

    .stat-hp .stat-dot { background: var(--accent); box-shadow: 0 0 8px rgba(232,130,155,0.5); }
    .stat-gold .stat-dot { background: var(--peach); box-shadow: 0 0 8px rgba(253,186,116,0.5); }
    .stat-xp .stat-dot { background: var(--sky); box-shadow: 0 0 8px rgba(147,197,253,0.5); }

    /* ─── THREAD CARD ─── */
    .thread-card {
      padding: 16px;
      margin-bottom: 10px;
    }

    .thread-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
      line-height: 1.4;
    }

    .thread-meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text-muted);
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
      align-items: center;
    }

    .thread-body {
      font-size: 13px;
      line-height: 1.6;
      padding: 14px;
      background: rgba(255,255,255,0.03);
      border-radius: 10px;
      border: 1px solid var(--glass-border);
      margin-bottom: 10px;
      position: relative;
    }

    .thread-body::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 2px;
      background: linear-gradient(180deg, var(--accent), var(--miku));
      border-radius: 1px;
    }

    /* ─── ROOM INDICATORS ─── */
    .indicators {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .indicator {
      padding: 4px 10px;
      border-radius: 100px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    .ind-trap { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.2); }
    .ind-heal { background: rgba(52,211,153,0.15); color: var(--green); border: 1px solid rgba(52,211,153,0.2); }
    .ind-power { background: rgba(253,186,116,0.15); color: var(--peach); border: 1px solid rgba(253,186,116,0.2); }
    .ind-monster { background: rgba(196,181,253,0.15); color: var(--lavender); border: 1px solid rgba(196,181,253,0.2); }

    /* ─── EXITS ─── */
    .exits-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .exit-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 12px 14px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      color: var(--text);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-bottom: 6px;
      text-align: left;
      font-family: 'Space Grotesk', sans-serif;
    }

    .exit-btn:hover {
      background: rgba(232,130,155,0.08);
      border-color: rgba(232,130,155,0.2);
      transform: translateX(4px);
      box-shadow: 0 4px 16px rgba(232,130,155,0.1);
    }

    .exit-arrow {
      color: var(--accent);
      font-size: 14px;
      flex-shrink: 0;
    }

    .exit-author {
      color: var(--accent);
      font-weight: 600;
      font-size: 11px;
    }

    .exit-preview {
      color: var(--text-muted);
      font-size: 11px;
      margin-left: 4px;
    }

    .exit-score {
      margin-left: auto;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    /* ─── COMBAT ─── */
    .combat-card {
      background: rgba(239,68,68,0.06);
      border: 1px solid rgba(239,68,68,0.15);
      padding: 16px;
      margin-bottom: 10px;
    }

    .combat-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--red);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .combat-monster-icon {
      width: 32px; height: 32px;
      background: rgba(239,68,68,0.15);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }

    .health-bar {
      width: 100%;
      height: 6px;
      background: rgba(255,255,255,0.06);
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 6px;
    }

    .health-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #FF6B6B);
      border-radius: 3px;
      transition: width 0.3s ease;
      box-shadow: 0 0 10px rgba(232,130,155,0.4);
    }

    .health-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .combat-actions {
      display: flex;
      gap: 8px;
    }

    /* ─── BUTTONS ─── */
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 50%);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .btn:hover::after { opacity: 1; }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #D4789C);
      color: white;
      box-shadow: 0 4px 16px rgba(232,130,155,0.3);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(232,130,155,0.4);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.06);
      color: var(--text);
      border: 1px solid var(--glass-border);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.15);
    }

    .btn-start {
      padding: 14px 32px;
      font-size: 14px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--accent), #D4789C);
      color: white;
      box-shadow: 0 8px 32px rgba(232,130,155,0.3),
                  inset 0 1px 0 rgba(255,255,255,0.2);
    }

    .btn-start:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(232,130,155,0.4);
    }

    /* ─── LOG ─── */
    .log-card {
      flex: 1;
      overflow-y: auto;
      padding: 12px 14px;
      margin-top: 10px;
      max-height: 140px;
      min-height: 60px;
    }

    .log-entry {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text-muted);
      padding: 4px 0;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      line-height: 1.5;
    }

    .log-trap { color: var(--red); }
    .log-heal { color: var(--green); }
    .log-power { color: var(--peach); }
    .log-combat { color: var(--lavender); }
    .log-level { color: var(--sky); }

    /* ─── DEPTH BAR ─── */
    .depth-bar {
      display: flex;
      gap: 4px;
      margin-bottom: 10px;
      padding: 8px 12px;
      background: rgba(255,255,255,0.02);
      border-radius: 10px;
      border: 1px solid var(--glass-border);
    }

    .depth-pip {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      transition: all 0.3s ease;
    }

    .depth-pip.active {
      background: var(--accent);
      border-color: var(--accent);
      box-shadow: 0 0 12px rgba(232,130,155,0.5);
    }

    .depth-pip.visited {
      background: rgba(232,130,155,0.25);
      border-color: rgba(232,130,155,0.3);
    }

    /* ─── VIBE BADGE ─── */
    .vibe-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: 100px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .vibe-horror { background: rgba(239,68,68,0.12); color: var(--red); border: 1px solid rgba(239,68,68,0.2); }
    .vibe-strategy { background: rgba(147,197,253,0.12); color: var(--sky); border: 1px solid rgba(147,197,253,0.2); }
    .vibe-zen { background: rgba(52,211,153,0.12); color: var(--green); border: 1px solid rgba(52,211,153,0.2); }
    .vibe-chaos { background: rgba(253,186,116,0.12); color: var(--peach); border: 1px solid rgba(253,186,116,0.2); }
    .vibe-mystery { background: rgba(196,181,253,0.12); color: var(--lavender); border: 1px solid rgba(196,181,253,0.2); }

    /* ─── GAME OVER ─── */
    .game-over {
      text-align: center;
      padding: 40px 20px;
    }

    .game-over-icon {
      font-size: 56px;
      margin-bottom: 16px;
      filter: drop-shadow(0 0 20px rgba(232,130,155,0.4));
    }

    .game-over h2 {
      font-size: 22px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 12px;
    }

    .game-over-stats {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-dim);
      margin-bottom: 24px;
      line-height: 2;
    }

    /* ─── START SCREEN ─── */
    .start-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
    }

    .start-icon {
      width: 80px; height: 80px;
      background: linear-gradient(135deg, rgba(232,130,155,0.2), rgba(126,221,214,0.2));
      border-radius: 24px;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
      margin-bottom: 24px;
      border: 1px solid var(--glass-border);
      box-shadow: 0 8px 32px rgba(232,130,155,0.15);
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .start-title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 12px;
      background: linear-gradient(135deg, var(--accent), var(--miku));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .start-desc {
      font-size: 13px;
      color: var(--text-dim);
      max-width: 320px;
      line-height: 1.7;
      margin-bottom: 32px;
    }

    .start-hint {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 16px;
      opacity: 0.6;
    }

    /* ─── SCROLLBAR ─── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

    /* ─── ANIMATIONS ─── */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .fade-in { animation: fadeIn 0.3s ease forwards; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .pulse { animation: pulse 2s ease-in-out infinite; }

    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    .shimmer {
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
      background-size: 200% 100%;
      animation: shimmer 3s ease-in-out infinite;
    }
  </style>
</head>
<body>
  <div class="bg-layer"></div>
  <div class="bg-overlay"></div>
  <div class="bg-noise"></div>

  <div class="app" id="app"></div>

  <script src="game.js"></script>
</body>
</html>
