<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thread Crawler</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg: #1a1a2e;
      --surface: #16213e;
      --surface-light: #1f2b47;
      --accent: #e94560;
      --accent-glow: rgba(233, 69, 96, 0.3);
      --green: #0f3460;
      --gold: #f5c518;
      --text: #e0e0e0;
      --text-dim: #8892a4;
      --border: rgba(255,255,255,0.08);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .app {
      max-width: 600px;
      margin: 0 auto;
      padding: 16px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
    }

    .logo {
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.5px;
    }

    .stats {
      display: flex;
      gap: 12px;
      font-size: 12px;
      color: var(--text-dim);
    }

    .stat {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .stat-icon {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
    }

    .stat-hp { background: #e94560; }
    .stat-gold { background: #f5c518; color: #000; }
    .stat-xp { background: #0f3460; }

    /* Thread Card */
    .thread-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .thread-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
      line-height: 1.4;
    }

    .thread-meta {
      font-size: 11px;
      color: var(--text-dim);
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
    }

    .thread-body {
      font-size: 13px;
      color: var(--text);
      line-height: 1.5;
      padding: 12px;
      background: var(--surface-light);
      border-radius: 8px;
      margin-bottom: 12px;
    }

    /* Room Indicators */
    .room-indicators {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .room-indicator {
      padding: 4px 8px;
      border-radius: 12px;
      font-size: 10px;
      font-weight: 600;
    }

    .indicator-trap { background: rgba(233, 69, 96, 0.2); color: #e94560; }
    .indicator-heal { background: rgba(76, 175, 80, 0.2); color: #4caf50; }
    .indicator-power { background: rgba(245, 197, 24, 0.2); color: #f5c518; }
    .indicator-monster { background: rgba(156, 39, 176, 0.2); color: #ce93d8; }

    /* Exits */
    .exits {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .exit-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: var(--surface-light);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .exit-btn:hover {
      background: var(--surface);
      border-color: var(--accent);
      transform: translateX(4px);
    }

    .exit-author {
      color: var(--accent);
      font-weight: 600;
      font-size: 12px;
    }

    .exit-score {
      margin-left: auto;
      font-size: 11px;
      color: var(--text-dim);
    }

    .exit-arrow {
      color: var(--accent);
      font-size: 14px;
    }

    /* Combat */
    .combat-box {
      background: rgba(233, 69, 96, 0.1);
      border: 1px solid rgba(233, 69, 96, 0.3);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .combat-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 8px;
    }

    .health-bar {
      width: 100%;
      height: 8px;
      background: rgba(255,255,255,0.1);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .health-fill {
      height: 100%;
      background: linear-gradient(90deg, #e94560, #ff6b6b);
      border-radius: 4px;
      transition: width 0.3s;
    }

    .combat-actions {
      display: flex;
      gap: 8px;
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-primary:hover {
      background: #d63a52;
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: var(--surface-light);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: var(--surface);
    }

    .btn-start {
      background: var(--accent);
      color: white;
      padding: 14px 28px;
      font-size: 15px;
    }

    /* Log */
    .log {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      background: var(--surface);
      border-radius: 8px;
      margin-top: 12px;
      max-height: 150px;
    }

    .log-entry {
      font-size: 11px;
      color: var(--text-dim);
      padding: 3px 0;
      border-bottom: 1px solid var(--border);
    }

    .log-trap { color: #e94560; }
    .log-heal { color: #4caf50; }
    .log-power { color: #f5c518; }
    .log-combat { color: #ce93d8; }
    .log-level { color: #64b5f6; }

    /* Game Over */
    .game-over {
      text-align: center;
      padding: 40px 20px;
    }

    .game-over h2 {
      font-size: 24px;
      color: var(--accent);
      margin-bottom: 16px;
    }

    .game-over-stats {
      font-size: 14px;
      color: var(--text-dim);
      margin-bottom: 24px;
      line-height: 1.8;
    }

    /* Vibe Badge */
    .vibe-badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .vibe-horror { background: rgba(233, 69, 96, 0.2); color: #e94560; }
    .vibe-strategy { background: rgba(33, 150, 243, 0.2); color: #2196f3; }
    .vibe-zen { background: rgba(76, 175, 80, 0.2); color: #4caf50; }
    .vibe-chaos { background: rgba(255, 152, 0, 0.2); color: #ff9800; }
    .vibe-mystery { background: rgba(156, 39, 176, 0.2); color: #ce93d8; }

    /* Depth Indicator */
    .depth-bar {
      display: flex;
      gap: 3px;
      margin-bottom: 12px;
    }

    .depth-pip {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--surface-light);
      border: 1px solid var(--border);
    }

    .depth-pip.active {
      background: var(--accent);
      border-color: var(--accent);
    }

    .depth-pip.visited {
      background: rgba(233, 69, 96, 0.3);
      border-color: rgba(233, 69, 96, 0.5);
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
  </style>
</head>
<body>
  <div class="app" id="app"></div>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  <script src="game.js"></script>
</body>
</html>
